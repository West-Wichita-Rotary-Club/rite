<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="xs (4px) through 2xl (64px)" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;font-family:var(--font-body);font-size:12px;color:var(--charcoal);}
.row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bar{background:var(--azure);height:14px;}
</style></head>
<body>
<div class="row"><div class="bar" style="width:var(--sp-xs);"></div>xs · 4px</div>
<div class="row"><div class="bar" style="width:var(--sp-sm);"></div>sm · 8px</div>
<div class="row"><div class="bar" style="width:var(--sp-md);"></div>md · 16px</div>
<div class="row"><div class="bar" style="width:var(--sp-lg);"></div>lg · 24px</div>
<div class="row"><div class="bar" style="width:var(--sp-xl);"></div>xl · 40px</div>
<div class="row"><div class="bar" style="width:var(--sp-2xl);"></div>2xl · 64px</div>
</body></html>
