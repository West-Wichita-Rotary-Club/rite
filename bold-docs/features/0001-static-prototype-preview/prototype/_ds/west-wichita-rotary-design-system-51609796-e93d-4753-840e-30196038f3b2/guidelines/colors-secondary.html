<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);height:150px;}
  .sw{display:flex;align-items:flex-end;padding:8px;color:#fff;font-size:11px;}
</style></head>
<body>
<div class="grid">
  <div class="sw" style="background:var(--cranberry);">Cranberry</div>
  <div class="sw" style="background:var(--cardinal);">Cardinal</div>
  <div class="sw" style="background:var(--slate);">Slate</div>
  <div class="sw" style="background:var(--turquoise);">Turquoise</div>
  <div class="sw" style="background:var(--violet);">Violet</div>
  <div class="sw" style="background:var(--orange);">Orange</div>
  <div class="sw" style="background:var(--grass);">Grass</div>
  <div class="sw" style="background:var(--powder-blue);color:#333;">Powder Blue</div>
  <div class="sw" style="background:var(--lavender);color:#333;">Lavender</div>
  <div class="sw" style="background:var(--stone);">Stone</div>
  <div class="sw" style="background:var(--moss);">Moss</div>
  <div class="sw" style="background:var(--taupe);color:#333;">Taupe</div>
</div>
</body></html>
