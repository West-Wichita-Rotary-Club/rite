<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Charcoal for text, Pewter/Smoke/Silver for muted UI" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);height:140px;}
  .sw{display:flex;align-items:flex-end;padding:8px;font-size:11px;}
</style></head>
<body>
<div class="grid">
  <div class="sw" style="background:var(--charcoal);color:#fff;">Charcoal</div>
  <div class="sw" style="background:var(--pewter);color:#fff;">Pewter</div>
  <div class="sw" style="background:var(--smoke);color:#333;">Smoke</div>
  <div class="sw" style="background:var(--silver);color:#333;">Silver</div>
  <div class="sw" style="background:var(--cloud);color:#333;">Cloud</div>
</div>
</body></html>
