<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">

<body>
<div class="row">
  <div class="sw" style="background:var(--rotary-gold);color:#54565a;"><span>Rotary Gold</span>#f7a81b · PMS 130C</div>
  <div class="sw" style="background:var(--royal-blue);"><span>Royal Blue</span>#17458f · PMS 286C</div>
  <div class="sw" style="background:var(--azure);"><span>Azure</span>#0067c8 · PMS 2175C — most used</div>
  <div class="sw" style="background:var(--sky-blue);"><span>Sky Blue</span>#00a2e0 · PMS 2202C</div>
</div>
