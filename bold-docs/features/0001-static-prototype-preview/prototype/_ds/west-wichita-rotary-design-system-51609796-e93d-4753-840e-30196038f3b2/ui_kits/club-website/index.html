<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>West Wichita Rotary — Club Website UI Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; font-family: var(--font-body); }
  a:hover { color: var(--royal-blue); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="EventsScreen.jsx"></script>
<script type="text/babel" src="MembershipScreen.jsx"></script>
<script type="text/babel">
const { Card, Button, Badge, Callout, AreaOfFocusTag } = window.WestWichitaRotaryDesignSystem_516097;
const { SiteHeader, SiteFooter } = window;
const { HomeScreen } = window;
const { EventsScreen } = window;
const { MembershipScreen } = window;

function App() {
  const [screen, setScreen] = React.useState('Home');
  const [rsvps, setRsvps] = React.useState({ 'Weekly Meeting — Guest Speaker: City Water Dept.': true });
  const [submitted, setSubmitted] = React.useState(false);

  const toggleRsvp = (title) => setRsvps(r => ({ ...r, [title]: !r[title] }));

  return (
    <div>
      <SiteHeader active={screen} onNav={setScreen} />
      {screen === 'Home' && <HomeScreen Card={Card} Button={Button} onNav={setScreen} />}
      {screen === 'Events' && <EventsScreen Card={Card} Badge={Badge} AreaOfFocusTag={AreaOfFocusTag} Button={Button} rsvps={rsvps} onToggleRsvp={toggleRsvp} />}
      {screen === 'Membership' && <MembershipScreen Callout={Callout} Card={Card} Button={Button} submitted={submitted} onSubmit={() => setSubmitted(true)} />}
      <SiteFooter />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
