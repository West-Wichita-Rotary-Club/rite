<!DOCTYPE html>
<html>
<head>

<style>

  <div class="tile">
    <div class="main"><img src="assets/logos/WestWichitaRotary.png" alt=""></div>

      <div style="background:#00a2e0;"></div>

      <div style="background:#17458f;"></div>
    </div>
  </div>
</body>
</html>
